<app-nav [hasResult]="!!result" (goDashboard)="goBack()"></app-nav>

<main class="app-main">
  @if (result) {
    <app-results
      [result]="result"
      [fileName]="fileName"
      [imageDataUrl]="imageDataUrl"
      (back)="goBack()" />
  } @else {
    <app-upload (analysisComplete)="onAnalysisComplete($event)" />
  }
</main>

<app-footer></app-footer>
